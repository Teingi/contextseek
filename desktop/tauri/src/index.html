<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ContextSeek</title>
    <script>
      // First-ever launch uses cinematic intro; subsequent launches use fast intro.
      (function () {
        var KEY = "ctxseek.boot.cinematic.v1.seen";
        var mode = "full";
        try {
          if (window.localStorage.getItem(KEY) === "1") {
            mode = "fast";
          } else {
            window.localStorage.setItem(KEY, "1");
          }
        } catch (_) {
          // If storage is unavailable, keep full mode as a safe default.
        }
        document.documentElement.setAttribute("data-boot-mode", mode);
      })();
    </script>
    <style>
      :root {
        --bg-0: #05070f;
        --bg-1: #0b1022;
        --bg-2: #131a34;
        --line: rgba(122, 167, 255, 0.18);
        --text-main: #dce8ff;
        --text-sub: #90a4cf;
        --accent: #58a6ff;
        --accent-2: #3ee7d0;
        --ring: rgba(88, 166, 255, 0.28);
        --glass-hi: rgba(214, 230, 255, 0.18);
      }

      html,
      body {
        margin: 0;
        height: 100%;
        color: var(--text-main);
        font-family: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
        overflow: hidden;
        background:
          radial-gradient(1200px 700px at 15% -10%, #1b3e9a33 0%, transparent 60%),
          radial-gradient(1000px 640px at 90% 120%, #00ffd033 0%, transparent 60%),
          linear-gradient(145deg, var(--bg-0) 0%, var(--bg-1) 54%, var(--bg-2) 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 38px 38px;
        mask-image: radial-gradient(circle at center, black 28%, transparent 88%);
        opacity: 0.35;
        animation: drift 16s linear infinite;
        pointer-events: none;
      }

      body::after {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 50% 50%, #7aa7ff26 0%, transparent 54%),
          radial-gradient(circle at 50% 50%, #3ee7d017 0%, transparent 68%);
        filter: blur(8px);
        pointer-events: none;
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        mix-blend-mode: soft-light;
        background-image:
          radial-gradient(rgba(255, 255, 255, 0.8) 0.45px, transparent 0.45px);
        background-size: 3px 3px;
      }

      .wrap {
        position: relative;
        height: 100%;
        display: grid;
        place-items: center;
      }

      .core {
        position: relative;
        width: min(92vw, 420px);
        padding: 44px 34px 34px;
        border-radius: 20px;
        border: 1px solid rgba(127, 159, 231, 0.2);
        background:
          linear-gradient(150deg, rgba(15, 22, 46, 0.82), rgba(8, 14, 32, 0.78));
        backdrop-filter: blur(7px);
        box-shadow:
          0 26px 70px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(190, 210, 255, 0.05),
          0 0 70px rgba(66, 130, 255, 0.14);
        transform: translateY(0) scale(1);
        animation: float 5.4s ease-in-out infinite;
      }

      .core::before {
        content: "";
        position: absolute;
        left: 18px;
        right: 18px;
        top: 16px;
        height: 1px;
        background: linear-gradient(90deg, transparent, #7aa7ff99, transparent);
      }

      .core::after {
        content: "";
        position: absolute;
        inset: 1px;
        border-radius: inherit;
        pointer-events: none;
        background:
          linear-gradient(
            110deg,
            transparent 6%,
            rgba(255, 255, 255, 0.1) 20%,
            transparent 36%
          );
        transform: translateX(-120%);
        animation: sheen 4.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      .glass-cut {
        position: absolute;
        inset: 0;
        border-radius: inherit;
        pointer-events: none;
        box-shadow:
          inset 0 1px 0 var(--glass-hi),
          inset 0 -24px 34px rgba(10, 17, 34, 0.44);
      }

      .title {
        font-size: 34px;
        letter-spacing: 0.05em;
        font-weight: 600;
        line-height: 1;
        margin: 0;
        text-shadow: 0 0 24px rgba(120, 176, 255, 0.24);
        opacity: 0;
        transform: translateY(10px) scale(0.985);
        filter: blur(6px);
        animation: intro-title 0.9s cubic-bezier(0.2, 0.75, 0.15, 1) 0.08s forwards;
      }

      .subtitle {
        margin-top: 8px;
        font-size: 12px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-sub);
        opacity: 0;
        transform: translateY(12px);
        filter: blur(3px);
        animation: intro-subtitle 0.8s cubic-bezier(0.22, 0.72, 0.22, 1) 0.82s forwards;
      }

      .status-zone {
        margin-top: 28px;
        display: flex;
        align-items: center;
        gap: 16px;
        opacity: 0;
        transform: translateY(10px);
        filter: blur(3px);
        animation: intro-status 0.72s ease-out 1.78s forwards;
      }

      .orbital {
        position: relative;
        width: 46px;
        height: 46px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #9cc2ff44, #5b85f112 58%, transparent 62%);
        filter: drop-shadow(0 0 16px rgba(88, 166, 255, 0.24));
      }

      .orbital::before,
      .orbital::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid var(--ring);
      }

      .orbital::before {
        transform: rotateX(66deg) rotate(0deg);
        animation: rotate 1.9s linear 2.14s infinite;
      }

      .orbital::after {
        transform: rotateY(70deg) rotate(60deg);
        border-color: rgba(62, 231, 208, 0.32);
        animation: rotate-rev 2.8s linear 2.16s infinite;
      }

      .pulse-dot {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: var(--accent-2);
        box-shadow: 0 0 14px #3ee7d0cc;
        opacity: 0;
        animation:
          pulse-intro 0.32s ease-out 2.08s forwards,
          pulse 1.4s ease-in-out 2.2s infinite;
      }

      .hint {
        margin: 0;
        color: #b2c1e3;
        font-size: 14px;
        letter-spacing: 0.01em;
        animation: breathe 2.8s ease-in-out infinite;
      }

      .progress {
        margin-top: 18px;
        height: 4px;
        border-radius: 999px;
        background: rgba(106, 138, 212, 0.18);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(153, 184, 255, 0.11);
        opacity: 0;
        transform: translateY(6px);
        animation: intro-progress 0.6s ease-out 2.15s forwards;
      }

      .bar {
        position: relative;
        height: 100%;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent) 0%, #7cc8ff 55%, var(--accent-2) 100%);
        box-shadow: 0 0 18px #58a6ff88;
        animation: load 2.1s ease-in-out infinite;
      }

      .bar::after {
        content: "";
        position: absolute;
        top: -4px;
        bottom: -4px;
        right: -24px;
        width: 28px;
        border-radius: 999px;
        filter: blur(5px);
        background: rgba(200, 237, 255, 0.65);
      }

      .sig {
        margin-top: 14px;
        color: #748ab8;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        opacity: 0;
        transform: translateY(6px);
        animation: intro-sig 0.68s ease-out 2.34s forwards;
      }

      html[data-boot-mode="fast"] .title {
        animation: intro-title 0.28s ease-out 0s forwards;
      }

      html[data-boot-mode="fast"] .subtitle {
        animation: intro-subtitle 0.24s ease-out 0.08s forwards;
      }

      html[data-boot-mode="fast"] .status-zone {
        animation: intro-status 0.24s ease-out 0.14s forwards;
      }

      html[data-boot-mode="fast"] .orbital::before {
        animation: rotate 1.9s linear 0.18s infinite;
      }

      html[data-boot-mode="fast"] .orbital::after {
        animation: rotate-rev 2.8s linear 0.2s infinite;
      }

      html[data-boot-mode="fast"] .pulse-dot {
        opacity: 1;
        animation: pulse 1.2s ease-in-out 0.2s infinite;
      }

      html[data-boot-mode="fast"] .progress {
        animation: intro-progress 0.22s ease-out 0.18s forwards;
      }

      html[data-boot-mode="fast"] .sig {
        animation: intro-sig 0.26s ease-out 0.22s forwards;
      }

      @keyframes rotate {
        to {
          transform: rotateX(66deg) rotate(360deg);
        }
      }

      @keyframes rotate-rev {
        to {
          transform: rotateY(70deg) rotate(-300deg);
        }
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translate(-50%, -50%) scale(1);
          opacity: 0.75;
        }
        50% {
          transform: translate(-50%, -50%) scale(1.35);
          opacity: 1;
        }
      }

      @keyframes load {
        0% {
          transform: translateX(-90%) scaleX(0.7);
        }
        40% {
          transform: translateX(28%) scaleX(1.05);
        }
        100% {
          transform: translateX(200%) scaleX(0.75);
        }
      }

      @keyframes drift {
        from {
          transform: translate3d(0, 0, 0);
        }
        to {
          transform: translate3d(38px, 38px, 0);
        }
      }

      @keyframes float {
        0%,
        100% {
          transform: translateY(0) scale(1);
        }
        50% {
          transform: translateY(-4px) scale(1.002);
        }
      }

      @keyframes sheen {
        0%,
        18% {
          transform: translateX(-120%);
          opacity: 0;
        }
        24% {
          opacity: 1;
        }
        42%,
        100% {
          transform: translateX(130%);
          opacity: 0;
        }
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.72;
        }
        50% {
          opacity: 1;
        }
      }

      @keyframes intro-title {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.985);
          filter: blur(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes intro-subtitle {
        from {
          opacity: 0;
          transform: translateY(12px);
          filter: blur(3px);
        }
        to {
          opacity: 0.92;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      @keyframes intro-status {
        from {
          opacity: 0;
          transform: translateY(10px);
          filter: blur(3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      @keyframes pulse-intro {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.2);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      @keyframes intro-progress {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes intro-sig {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 0.9;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .core,
        .core::after,
        .title,
        .subtitle,
        .status-zone,
        .orbital::before,
        .orbital::after,
        .pulse-dot,
        .progress,
        .bar,
        .sig,
        body::before {
          animation: none !important;
          transition: none !important;
        }

        .title,
        .subtitle,
        .status-zone,
        .progress,
        .sig,
        .pulse-dot {
          opacity: 1;
          transform: none;
          filter: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="noise"></div>
    <div class="wrap">
      <main class="core" role="status" aria-live="polite">
        <div class="glass-cut"></div>
        <h1 class="title">ContextSeek</h1>
        <div class="subtitle">Neural Context Engine</div>

        <div class="status-zone">
          <div class="orbital">
            <div class="pulse-dot"></div>
          </div>
          <p class="hint">Booting local intelligence service...</p>
        </div>

        <div class="progress"><div class="bar"></div></div>
        <div class="sig">establishing secure semantic channel</div>
      </main>
    </div>
    <script>
      // The Host navigates this window to the local server once /health passes,
      // or to diagnostic.html on failure. If the sidecar dies later, show a hint.
      window.addEventListener("sidecar-down", function () {
        const hint = document.querySelector(".hint");
        const sig = document.querySelector(".sig");
        if (hint) hint.textContent = "Local service interrupted. Attempting recovery...";
        if (sig) sig.textContent = "reconnecting runtime process";
      });
    </script>
  </body>
</html>
